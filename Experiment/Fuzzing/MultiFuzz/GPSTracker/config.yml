#include:
#  - ./syms.yml

interrupt_triggers:
  trigger:
    every_nth_tick: 0x3e8
    fuzz_mode: round_robin

adapter:
  0x80a24:
    irq_addr: 0x82c04
    adapter_addr: 0x80a24
    min_len: 0x1
    max_len: 0x100
  0x80a48:
    irq_addr: 0x82c04
    adapter_addr: 0x80a48
    min_len: 0x1
    max_len: 0x100
  0x82394:
    irq_addr: 0x82c04
    adapter_addr: 0x82394
    min_len: 0x1
    max_len: 0x100
  0x81df0:
    irq_addr: 0x82c04
    adapter_addr: 0x81df0
    min_len: 0x1
    max_len: 0x100


memory_map:
  mmio: {base_addr:  0x40000000, size: 0x20000000, permissions: rw-}
  nvic: {base_addr:  0xe0000000, size: 0x10000000, permissions: rw-}
  irq_ret: {base_addr: 0xfffff000, size: 0x1000, permissions: --x}

  mmio_UDD:
    base_addr: 0x20180000
    permissions: rw-
    size: 0x20000
  flash:
    base_addr: 0xa0000
    permissions: rw-
    size: 0x1000
  ram:
    base_addr: 0x20070000
    permissions: rw-
    size: 0x90000
  text:
    base_addr: 0x80000
    file: uEmu.GPSTracker.bin
    permissions: r-x
    size: 0xc000
